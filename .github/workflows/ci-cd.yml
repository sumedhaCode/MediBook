name: MediBook CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Frontend Lint
        run: npm run lint
        continue-on-error: true

      - name: Build Frontend
        run: npm run build

  backend-ci:
    name: Backend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/auth-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/auth-service/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: true

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Backend Render Deploy
        run: curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Frontend Render Deploy
        run: curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"